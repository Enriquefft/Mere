---
name: Feature Request
about: Propose a new feature or enhancement for Mere
title: "[FEATURE] <feature title>"
labels: enhancement
assignees: ''

body:
  - type: markdown
  attributes:
    value: |
      ## Feature Description
      Describe the feature or enhancement you'd like to see in Mere.

      ## Problem Statement
      What problem does this feature solve?

      ## Proposed Solution
      How should this feature work?

      ## Use Cases
      Describe specific scenarios where this would be helpful.

      ## Alternatives Considered
      Are there other ways to solve this? Why is your approach better?

      ## Additional Context
      Any other information, screenshots, or examples that help clarify your request.
    render: markdown
